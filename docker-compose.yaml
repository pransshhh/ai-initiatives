name: ai-initiatives
services:
  db:
    image: postgres:16-alpine
    container_name: ai-initiatives-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ai-initiatives
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d ai-initiatives" ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: